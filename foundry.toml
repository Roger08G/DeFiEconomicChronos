[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
remappings = []
gas_reports = ["*"]
verbosity = 2

[fuzz]
runs = 1000
max_test_rejects = 65536

[invariant]
runs = 256
depth = 15

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 512 }
verbosity = 3
